services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_DIR: /app/sessions
    volumes:
      - backend_sessions:/app/sessions
      - backend_uploads:/app/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  backend_sessions:
  backend_uploads:
  caddy_data:
  caddy_config:
